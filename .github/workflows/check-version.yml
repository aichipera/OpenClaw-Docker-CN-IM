name: Check OpenClaw New Version

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  REGISTRY_NPM: https://registry.npmjs.org
  PACKAGE_NAME: openclaw

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # 使用 PAT 推送以触发其他工作流（GITHUB_TOKEN 推送不会触发 Actions）
      GH_PAT: ${{ secrets.GH_PAT }}

    outputs:
      has_new_version: ${{ steps.check.outputs.has_new_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
      current_version: ${{ steps.check.outputs.current_version }}
      publish_time: ${{ steps.check.outputs.publish_time }}
      commit_time: ${{ steps.check.outputs.commit_time }}

    steps:
      - name: 检查是否为 dev 分支
        id: branch-check
        run: |
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
          fi

      - name: 检出代码
        if: steps.branch-check.outputs.is_dev == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 获取当前版本
        if: steps.branch-check.outputs.is_dev == 'true'
        id: current
        run: |
          CURRENT_VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "📦 当前版本：$CURRENT_VERSION"

      - name: 获取 openclaw 最新版本
        if: steps.branch-check.outputs.is_dev == 'true'
        id: check
        run: |
          CURRENT_VERSION=$(cat version.txt | tr -d '[:space:]')

          # 从 npm 获取最新版本信息
          LATEST_INFO=$(curl -s "$REGISTRY_NPM/$PACKAGE_NAME/latest")
          LATEST_VERSION=$(echo "$LATEST_INFO" | jq -r '.version')

          # 获取完整包信息以获取发布时间
          PACKAGE_INFO=$(curl -s "$REGISTRY_NPM/$PACKAGE_NAME")
          PUBLISH_TIME=$(echo "$PACKAGE_INFO" \
            | jq -r ".time[\"$LATEST_VERSION\"]")

          # 获取当前 commit 的提交时间
          COMMIT_TIME=$(git log -1 --format=%aI)

          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "publish_time=$PUBLISH_TIME" >> $GITHUB_OUTPUT
          echo "commit_time=$COMMIT_TIME" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          echo "📦 npm 最新版本：$LATEST_VERSION"
          echo "📅 npm 发布时间：$PUBLISH_TIME"
          echo "📅 当前 commit 时间：$COMMIT_TIME"
          echo "📦 当前 version.txt: $CURRENT_VERSION"

          # 比较时间：如果 npm 发布时间比 commit 时间新，说明有新版本
          # 将时间转换为秒数进行比较
          PUBLISH_TS=$(date -d "$PUBLISH_TIME" +%s 2>/dev/null || echo "0")
          COMMIT_TS=$(date -d "$COMMIT_TIME" +%s 2>/dev/null || echo "0")

          echo "🔢 npm 发布时间戳：$PUBLISH_TS"
          echo "🔢 commit 时间戳：$COMMIT_TS"

          if [ "$PUBLISH_TS" -gt "$COMMIT_TS" ]; then
            echo "✅ npm 版本发布时间比当前 commit 新！"
            echo "has_new_version=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ 当前 commit 已经是最新的"
            echo "has_new_version=false" >> $GITHUB_OUTPUT
          fi

      - name: 更新 version.txt 并推送
        if: steps.check.outputs.has_new_version == 'true'
        run: |
          NEW_VERSION="${{ steps.check.outputs.latest_version }}"
          CURRENT_VERSION="${{ steps.check.outputs.current_version }}"

          git config user.name "AgiNow"
          git config user.email "aginow@163.com"

          # 更新 version.txt
          echo "$NEW_VERSION" > version.txt

          # 更新 Dockerfile 中的 openclaw 版本
          sed -i "s/openclaw@$CURRENT_VERSION/openclaw@$NEW_VERSION/g" \
              Dockerfile

          git add version.txt Dockerfile
          git commit -m "chore: 更新 openclaw 至 v${NEW_VERSION}" \
              -m "- 当前版本：${CURRENT_VERSION}" \
              -m "- 新版本：${NEW_VERSION}" \
              -m "- 自动检测更新"

          # 使用 PAT 推送以触发 docker-build-push.yml
          git push https://${GH_PAT}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}

          echo "✅ 已更新 version.txt 和 Dockerfile 至版本 $NEW_VERSION"
          echo "🚀 推送后将自动触发 docker-build-push.yml workflow"
