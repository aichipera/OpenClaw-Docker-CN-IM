name: Build and Push Docker Image

on:
  push:
    paths:
      - 'version.txt'
      - 'Dockerfile'
    branches:
      - main
      - master
      - dev
  schedule:
    # 每天 UTC 时间 0:30 运行（北京时间 8:30）
    # 比 check-version.yml 晚 30 分钟，确保有足够时间处理版本更新
    - cron: '30 0 * * *'
  workflow_dispatch:

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "tag=dev-$VERSION" >> $GITHUB_OUTPUT
            echo "latest_tag=dev" >> $GITHUB_OUTPUT
          else
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          fi
          echo "📦 构建版本：$VERSION"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查镜像是否已存在（仅定时任务）
        id: check_exists
        if: github.event_name == 'schedule'
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "🔍 检查 version.txt 中的版本：$VERSION"

          # 根据分支确定 tag
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            TAG="dev-$VERSION"
          else
            TAG="$VERSION"
          fi

          DOCKERHUB_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:$TAG"
          GHCR_IMAGE="${{ env.REGISTRY_GHCR }}/${{ github.repository }}:$TAG"

          echo "🔍 检查镜像是否存在..."
          echo "  Docker Hub: $DOCKERHUB_IMAGE"
          echo "  GHCR: $GHCR_IMAGE"

          EXISTS=false

          # 检查 Docker Hub
          if docker manifest inspect "$DOCKERHUB_IMAGE" > /dev/null 2>&1; then
            echo "✅ Docker Hub 镜像已存在：$DOCKERHUB_IMAGE"
            EXISTS=true
          fi

          # 检查 GHCR
          if docker manifest inspect "$GHCR_IMAGE" > /dev/null 2>&1; then
            echo "✅ GHCR 镜像已存在：$GHCR_IMAGE"
            EXISTS=true
          fi

          echo "exists=$EXISTS" >> $GITHUB_OUTPUT

          if [ "$EXISTS" = "true" ]; then
            echo "⏭️  版本 $VERSION 已构建，跳过本次构建。"
          else
            echo "🆕 版本 $VERSION 未构建，开始构建..."
          fi

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.latest_tag }}
            type=sha,prefix={{branch}}-

      - name: 构建并推送 Docker 镜像
        if: github.event_name != 'schedule' || steps.check_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像信息
        if: github.event_name != 'schedule' || steps.check_exists.outputs.exists != 'true'
        run: |
          echo "✅ Docker 镜像构建并推送成功！"
          echo ""
          echo "📋 镜像标签："
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
          echo ""
          echo "🔖 版本号：${{ steps.version.outputs.version }}"
          echo ""
          echo "📦 Docker Hub: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.tag }}"
          echo "📦 GHCR: ${{ env.REGISTRY_GHCR }}/${{ github.repository }}:${{ steps.version.outputs.tag }}"

      - name: 跳过构建提示（仅定时任务）
        if: github.event_name == 'schedule' && steps.check_exists.outputs.exists == 'true'
        run: |
          echo "⏭️  镜像已存在，跳过构建。"
          echo ""
          echo "🔖 版本号：${{ steps.version.outputs.version }}"
          echo "📦 Docker Hub: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version.outputs.tag }}"
          echo "📦 GHCR: ${{ env.REGISTRY_GHCR }}/${{ github.repository }}:${{ steps.version.outputs.tag }}"
