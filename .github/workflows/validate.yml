name: Validate Configuration

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.env.example'
      - '.github/workflows/validate.yml'
  push:
    branches: [main, master, dev]

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose
        run: docker compose config --quiet

  validate-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3
        with:
          dockerfile: Dockerfile

  validate-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest
      - name: Validate Python syntax
        run: |
          find scripts/openclaw-config -name "*.py" -exec python -m py_compile {} + || exit 1
      - name: Run tests
        run: python -m pytest scripts/tests/ -v

  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: apt-get update && apt-get install -y shellcheck
      - name: Validate shell scripts
        run: |
          shellcheck scripts/init.sh scripts/init-utils.sh scripts/init-permissions.sh scripts/init-plugins.sh scripts/init-config.sh scripts/init-agent-reach.sh scripts/backup.sh scripts/restore.sh
