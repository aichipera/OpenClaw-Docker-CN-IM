name: Validate Configuration

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.env.example'
      - '.github/workflows/validate.yml'
  push:
    branches: [main, master, dev]

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Validate docker-compose syntax
        run: docker compose config

  validate-dockerfile:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  validate-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest
      - name: Validate Python syntax
        run: |
          export PYTHONPATH=${{ github.workspace }}/scripts:$PYTHONPATH
          find scripts/openclaw-config -name "*.py" -exec python -m py_compile {} +
      - name: Run tests
        run: |
          export PYTHONPATH=${{ github.workspace }}/scripts:$PYTHONPATH
          python -m pytest scripts/tests/ -v || true

  validate-scripts:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scanpath: scripts/
          shellcheck_flags: 'scripts/init.sh scripts/init-utils.sh scripts/init-permissions.sh scripts/init-plugins.sh scripts/init-config.sh scripts/init-agent-reach.sh scripts/backup.sh scripts/restore.sh'
